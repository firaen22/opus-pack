name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo consistency checks
        run: python3 .github/checks.py

  hook-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gate-before-commit suite
        run: bash hooks/test-gate-before-commit.sh
      - name: gate-credential-destruction suite
        run: bash hooks/test-gate-credential-destruction.sh
      - name: verify-before-stop suite
        run: bash hooks/test-verify-before-stop.sh

  gate-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: ground-truth-gates starter template runs green
        run: bash skills/ground-truth-gates/template/run-all.sh
